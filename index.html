<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Judiciaire Interactif</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --primary: #1e3799;
            --primary-light: #4a69bd;
            --secondary: #f6b93b;
            --success: #2ed573;
            --danger: #ff4757;
            --bg-color: #f1f2f6;
            --card-bg: #ffffff;
            --text-main: #2f3542;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a4b0be 0%, #f1f2f6 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            background-color: var(--card-bg);
            max-width: 800px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        h1, h2 {
            color: var(--primary);
            text-align: center;
            font-weight: 800;
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ACCUEIL --- */
        .theme-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(30, 55, 153, 0.3);
        }

        .theme-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(30, 55, 153, 0.4);
        }

        /* --- HEADER QUIZ (Stats & Barre) --- */
        .quiz-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1.1em;
        }

        .stat-correct { color: var(--success); }
        .stat-incorrect { color: var(--danger); }

        .progress-container {
            width: 100%;
            height: 10px;
            background-color: #dfe4ea;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), #ff9f43);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* --- QUESTIONS & OPTIONS --- */
        .question-text {
            font-size: 1.4em;
            margin-bottom: 15px;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
        }

        .instruction {
            font-size: 0.9em;
            color: #747d8c;
            text-align: center;
            margin-bottom: 25px;
            font-style: italic;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            padding: 18px 20px;
            border: 2px solid #dfe4ea;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #fff;
            font-weight: 600;
            font-size: 1.1em;
            position: relative;
        }

        .option:hover:not(.disabled) {
            border-color: var(--primary-light);
            background-color: #f1f2f6;
            transform: scale(1.01);
        }

        .option.selected {
            border-color: var(--primary);
            background-color: #eccc68;
            color: #2f3542;
        }

        .option.correct {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
            animation: popIn 0.3s ease;
        }

        .option.incorrect {
            background-color: var(--danger);
            border-color: var(--danger);
            color: white;
            animation: shake 0.4s ease;
        }

        .option.missed {
            border-color: var(--success);
            border-style: dashed;
            background-color: #e8f8f5;
            color: var(--success);
        }

        .disabled {
            pointer-events: none;
        }

        /* --- BOÎTE D'EXPLICATION --- */
        #explanation-box {
            display: none;
            background-color: #f8f9fa;
            border-left: 5px solid var(--secondary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        #explanation-box h3 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .source-tag {
            display: inline-block;
            background-color: var(--primary-light);
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.85em;
            margin-top: 10px;
            font-weight: 600;
        }

        /* --- BOUTONS D'ACTION --- */
        .btn-action {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-action:hover {
            background-color: #152a7b;
            transform: translateY(-2px);
        }

        .btn-action:disabled {
            background-color: #ced6e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #next-btn {
            background-color: var(--secondary);
            color: #2f3542;
        }
        #next-btn:hover {
            background-color: #e5a822;
        }

        /* --- ÉCRAN DE FIN --- */
        .final-grade {
            font-size: 1.5em;
            text-align: center;
            color: var(--secondary);
            font-weight: 800;
            margin: 20px 0;
            padding: 20px;
            background: var(--primary);
            border-radius: 15px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(var(--success) var(--percentage), #dfe4ea 0deg);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px auto;
            font-size: 2em;
            font-weight: bold;
            position: relative;
        }
        
        .score-circle::after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: var(--card-bg);
            border-radius: 50%;
        }

        .score-circle span {
            position: relative;
            z-index: 1;
            color: var(--text-main);
        }

        /* --- RÉTROSPECTIVE & THÈMES --- */
        .theme-stat {
            display: flex;
            justify-content: space-between;
            background: #fff;
            padding: 12px 20px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #dfe4ea;
            font-size: 1.1em;
            color: var(--primary);
        }
        .theme-stat strong {
            color: var(--text-main);
        }
        .review-item {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid var(--danger);
            text-align: left;
        }
        .review-item h4 {
            margin-top: 0;
            color: var(--primary);
        }

    </style>
</head>
<body>

<div id="home-screen" class="screen active">
    <h1>👮 Quiz Académie de Police</h1>
    <p style="text-align: center; color: #747d8c; margin-bottom: 30px;">Sélectionnez le module à réviser :</p>
    
    <div style="background: #eccc68; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
        <h2 style="color: #2f3542; margin-top: 0;">🔥 Super Thème Aléatoire</h2>
        <p style="text-align: center; font-size: 0.9em; margin-bottom: 15px;">Mélange de tous les modules :</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="startSuperQuiz(5)" class="theme-btn" style="margin: 0; width: auto; background: var(--primary);">5 Q</button>
            <button onclick="startSuperQuiz(20)" class="theme-btn" style="margin: 0; width: auto; background: var(--primary);">20 Q</button>
            <button onclick="startSuperQuiz(50)" class="theme-btn" style="margin: 0; width: auto; background: var(--primary);">50 Q</button>
        </div>
    </div>
    <hr style="border: 1px solid #dfe4ea; margin: 30px 0;">
    <div id="theme-list"></div>
</div>
<hr style="border: 1px solid #dfe4ea; margin: 30px 0;">

    <div id="quiz-screen" class="screen">
      <button onclick="confirmGoToHome()" class="theme-btn" style="padding: 10px; margin-bottom: 20px; font-size: 1em; width: auto;">🏠 Retour à l'accueil</button>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <div class="quiz-stats">
            <span id="question-counter">📝 Q 1/10</span>
            <div style="display: flex; gap: 15px;">
                <span class="stat-badge stat-correct">✅ <span id="correct-counter">0</span></span>
                <span class="stat-badge stat-incorrect">❌ <span id="incorrect-counter">0</span></span>
            </div>
        </div>

        <div id="instruction" class="instruction"></div>
        <div id="current-theme-label" style="text-align: center; color: var(--primary-light); font-weight: bold; margin-bottom: 5px; font-size: 0.9em; text-transform: uppercase;"></div>
        <div id="question-text" class="question-text"></div>
        
        <div id="options-container" class="options-container"></div>
        
        <div id="explanation-box"></div>

        <button id="validate-btn" class="btn-action">Valider ma réponse</button>
        <button id="next-btn" class="btn-action" style="display: none;">Question suivante ➡️</button>
    </div>

    <div id="end-screen" class="screen">
        <h1>Bilan de l'évaluation</h1>
        
        <div class="score-circle" id="score-circle">
            <span id="final-score-text">0%</span>
        </div>

        <div class="final-grade" id="final-grade"></div>
        
        <div class="quiz-stats" style="justify-content: space-around; font-size: 1.2em; padding: 20px;">
            <span class="stat-badge stat-correct">✅ <span id="final-correct">0</span> Bonnes</span>
            <span class="stat-badge stat-incorrect">❌ <span id="final-incorrect">0</span> Mauvaises</span>
        </div>

        <div id="theme-breakdown" style="margin-bottom: 25px; display: none;"></div>

        <button id="review-btn" onclick="showReviewScreen()" class="theme-btn" style="background: var(--primary-light); display: none;">👀 Revoir les questions ratées</button>
        <button onclick="goToHome()" class="theme-btn">🔄 Repasser à l'accueil</button>
    </div>

    <div id="review-screen" class="screen">
        <h1>Correction des erreurs</h1>
        <div id="review-container"></div>
        <button onclick="backToEndScreen()" class="theme-btn">⬅️ Retour au bilan</button>
        <button onclick="goToHome()" class="theme-btn" style="background: var(--primary-light);">🏠 Retour à l'accueil</button>
    </div>
</div>

<script>
    // =========================================================================
    // 📂 ZONE DE COPIER-COLLER DES JSON
    // Ajoutez vos thèmes ci-dessous. Le format est :
    // "Nom du Thème": [ ...collez le contenu du json ici... ],
    // N'oubliez pas la virgule entre chaque thème !
    // =========================================================================

    const themesData = {

        "Enquête Judiciaire": [
  {
    "id": 1,
    "question": "Quelles sont les différentes phases du procès pénal en France ?",
    "propositions": [
      "La phase d'enquête",
      "La phase des poursuites",
      "L'instruction préparatoire",
      "La phase de jugement"
    ],
    "reponse_correcte": [0, 1, 2, 3],
    "justification": "Le procès pénal comporte quatre phases : l'enquête (police), les poursuites (parquet), l'instruction (juge d'instruction) et le jugement."
  },
  {
    "id": 2,
    "question": "Qui dirige l'activité des officiers et agents de police judiciaire lors de la phase d'enquête ?",
    "propositions": [
      "Le Juge des libertés et de la détention",
      "Le Procureur de la République",
      "Le Maire de la commune",
      "Le Préfet"
    ],
    "reponse_correcte": [1],
    "justification": "L'enquête est effectuée sous la direction du Procureur de la République qui contrôle la légalité et l'orientation des actes (Art. 12 C.P.P.)."
  },
  {
    "id": 3,
    "question": "Quelles sont les missions de l'enquête de police selon l'article 14 du C.P.P. ?",
    "propositions": [
      "Constater les infractions",
      "Juger les coupables de délits mineurs",
      "Rassembler les preuves",
      "Rechercher les auteurs"
    ],
    "reponse_correcte": [0, 2, 3],
    "justification": "La mission de police judiciaire définie à l'art. 14 du C.P.P. est de rechercher, constater les infractions, rassembler les preuves et identifier les auteurs."
  },
  {
    "id": 4,
    "question": "Parmi les personnels suivants, lesquels ont de plein droit la qualité d'Officier de Police Judiciaire (OPJ) sans nécessiter d'habilitation ?",
    "propositions": [
      "Les Maires et leurs adjoints",
      "Les agents de police municipale",
      "Le directeur et sous-directeur de la PJ",
      "Les agents de police judiciaire (APJ)"
    ],
    "reponse_correcte": [0, 2],
    "justification": "Les maires, leurs adjoints, ainsi que le directeur et sous-directeur de la police judiciaire exercent de plein droit la fonction d'OPJ sans habilitation préalable."
  },
  {
    "id": 5,
    "question": "Quelles questions composent l'A.B.C. de toute enquête judiciaire ?",
    "propositions": [
      "Qui ?",
      "Combien ça coûte ?",
      "Où et Quand ?",
      "Comment et Pourquoi ?"
    ],
    "reponse_correcte": [0, 2, 3],
    "justification": "Toute enquête doit répondre aux immuables questions : Qui ? A fait Quoi ? Où ? Comment ? Avec qui ? Avec quoi ? Quand ? Pourquoi ?"
  },
  {
    "id": 6,
    "question": "Quels sont les modes de saisine permettant de déclencher une enquête de police ?",
    "propositions": [
      "La dénonciation",
      "La plainte de la victime",
      "L'initiative des policiers",
      "Les instructions du Procureur"
    ],
    "reponse_correcte": [0, 1, 2, 3],
    "justification": "La saisine peut résulter d'une dénonciation, d'une plainte, d'une initiative (constatation) ou de notes du Parquet (instructions)."
  },
  {
    "id": 7,
    "question": "Quelle est la durée initiale d'une enquête pour infraction flagrante (avant toute éventuelle prolongation) ?",
    "propositions": [
      "24 heures",
      "8 jours",
      "1 mois",
      "2 ans"
    ],
    "reponse_correcte": [1],
    "justification": "L'enquête de flagrance se poursuit sans discontinuer pendant une durée de huit jours."
  },
  {
    "id": 8,
    "question": "Quels éléments permettent de définir une situation de flagrance selon l'article 53 du C.P.P. ?",
    "propositions": [
      "L'infraction se commet actuellement",
      "L'infraction vient de se commettre",
      "La personne est poursuivie par la clameur publique",
      "La plainte est déposée un mois plus tard"
    ],
    "reponse_correcte": [0, 1, 2],
    "justification": "Il y a flagrance quand l'action se commet ou vient de se commettre, ou dans un temps très voisin en cas de clameur publique ou de traces/indices."
  },
  {
    "id": 9,
    "question": "Quelle est la durée maximale absolue d'une enquête préliminaire de droit commun, incluant la prolongation exceptionnelle ?",
    "propositions": [
      "1 an",
      "3 ans",
      "5 ans",
      "10 ans"
    ],
    "reponse_correcte": [2],
    "justification": "Elle est de 2 ans, prolongeable 1 an, puis exceptionnellement à l'issue des 3 ans, prolongeable d'un an renouvelable une fois, soit 5 ans au maximum."
  },
  {
    "id": 10,
    "question": "Dans quel cas la procédure de recherche des causes de la mort (Art. 74 C.P.P.) est-elle appliquée ?",
    "propositions": [
      "Découverte d'une mort naturelle certaine",
      "Mort dont la cause est inconnue ou suspecte",
      "Toute mort à l'hôpital avec un médecin présent",

    "reponse_correcte": [1, 3],

    "id": 11,
    "question": "Quelle procédure doit être mise en œuvre lors de la découverte d'une personne inanimée, dans un coma inexpliqué ?",

      "L'article 74 al. 6 du C.P.P. (personne grièvement blessée)",
      "L'enquête pour mort naturelle",

      "L'article 74-1 du C.P.P. (disparition)"

    "reponse_correcte": [0],
    "justification": "C'est l'article 74 al. 6 du C.P.P. qui encadre la découverte d'une personne grièvement blessée lorsque la cause des blessures est inconnue ou suspecte."

  {

  },
  {
    "id": 13,

    "id": 14,

  {

    "reponse_correcte": [2],
    "justification": "En enquête préliminaire, la perquisition requiert le consentement exprès et manuscrit de la personne chez qui elle a lieu."

  {

  {
    "id": 17,
    "question": "Qui a l'habilitation exclusive pour réaliser ou ordonner une perquisition en enquête de flagrance ?",

  {

  {

  {
    "id": 20,
    "question": "Dans le cadre de l'audition libre, la personne entendue a le droit de :",
    "propositions": [

      "Bénéficier du droit au silence",
      "Ne pas être informée de la qualification des faits",
      "Être assistée d'un avocat"
    ],
    "reponse_correcte": [0, 1, 3],

  },
  {
    "id": 21,
    "question": "Combien de temps maximum un témoin peut-il être retenu sous contrainte pour une audition ?",
    "propositions": [
      "2 heures",
      "4 heures",
      "24 heures",
      "48 heures"
    ],
    "reponse_correcte": [1],

  },
  {

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let correctCount = 0;
    let incorrectCount = 0;
    let selectedAnswers = [];
    let userResults = [];

    function startSuperQuiz(limit) {
    let allQuestions = [];
    
    // Parcourir chaque thème dans le JSON
    for (let themeName in themesData) {
        let questionsInTheme = themesData[themeName];
        
        // Copier chaque question et lui ajouter une étiquette de thème
        questionsInTheme.forEach(q => {
            let qCopy = { ...q, theme_label: themeName };
            allQuestions.push(qCopy);
        });
    }
    
    // Mélanger toutes les questions
    let shuffledAll = shuffleArray(allQuestions);
    
    // Garder seulement le nombre demandé (limite)
    currentQuestions = shuffledAll.slice(0, limit);
    
    // Réinitialiser les compteurs et lancer le quiz
    currentQuestionIndex = 0;
    correctCount = 0;
    incorrectCount = 0;
    
    updateCountersUI();
    showScreen('quiz-screen');
    loadQuestion();
}

    function confirmGoToHome() {
    if (confirm("Voulez-vous vraiment quitter l'évaluation en cours ? Votre progression sera perdue.")) {
        goToHome();
    }
}

    function shuffleArray(array) {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    function initHome() {
        const themeList = document.getElementById('theme-list');
        themeList.innerHTML = '';
        
        for (let themeName in themesData) {
            const btn = document.createElement('button');
            btn.className = 'theme-btn';
            btn.textContent = `📁 ${themeName} (${themesData[themeName].length} Q)`;
            
            // On désactive le bouton si le thème est vide
            if (themesData[themeName].length === 0) {
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.textContent = `📁 ${themeName} (Vide)`;
            } else {
                btn.onclick = () => startQuiz(themeName);
            }
            themeList.appendChild(btn);
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startQuiz(themeName) {
        currentQuestions = shuffleArray(themesData[themeName]);
        currentQuestionIndex = 0;
        correctCount = 0;
        incorrectCount = 0;
        userResults = [];
        
        updateCountersUI();
        showScreen('quiz-screen');
        loadQuestion();
    }

    function updateCountersUI() {
        document.getElementById('correct-counter').textContent = correctCount;
        document.getElementById('incorrect-counter').textContent = incorrectCount;
        
        const progress = (currentQuestionIndex / currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function loadQuestion() {
        selectedAnswers = [];
        const q = currentQuestions[currentQuestionIndex];
        const isMultiple = Array.isArray(q.reponse_correcte);

        updateCountersUI();
        document.getElementById('question-counter').textContent = `📝 Q ${currentQuestionIndex + 1}/${currentQuestions.length}`;
        document.getElementById('question-text').textContent = q.question;

        const themeLabelDiv = document.getElementById('current-theme-label');
        if (q.theme_label) {
            themeLabelDiv.textContent = `Thème : ${q.theme_label}`;
            themeLabelDiv.style.display = 'block';
        } else {
            // Si on joue un thème classique, l'étiquette n'existe pas, on la cache
            themeLabelDiv.style.display = 'none';
        }
        
        document.getElementById('explanation-box').style.display = 'none';

        document.getElementById('instruction').textContent = isMultiple ? 
            "⚠️ Attention : Plusieurs réponses sont possibles." : 
            "👉 Une seule réponse possible.";

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        q.propositions.forEach((prop, index) => {
            const optionDiv = document.createElement('div');
            optionDiv.className = 'option';
            optionDiv.textContent = prop;
            optionDiv.onclick = () => toggleOption(index, optionDiv, isMultiple);
            optionsContainer.appendChild(optionDiv);
        });

        const validateBtn = document.getElementById('validate-btn');
        const nextBtn = document.getElementById('next-btn');
        
        validateBtn.style.display = 'block';
        validateBtn.disabled = true; 
        validateBtn.onclick = () => validateAnswer(q, isMultiple);
        
        nextBtn.style.display = 'none';
        nextBtn.onclick = loadNextQuestion;
    }

    function toggleOption(index, optionElement, isMultiple) {
        if (optionElement.classList.contains('disabled')) return;

        if (!isMultiple) {
            selectedAnswers = [index];
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            optionElement.classList.add('selected');
        } else {
            const existingIndex = selectedAnswers.indexOf(index);
            if (existingIndex > -1) {
                selectedAnswers.splice(existingIndex, 1);
                optionElement.classList.remove('selected');
            } else {
                selectedAnswers.push(index);
                optionElement.classList.add('selected');
            }
        }

        document.getElementById('validate-btn').disabled = selectedAnswers.length === 0;
    }

    function validateAnswer(questionObj, isMultiple) {
        const correctAnswers = isMultiple ? questionObj.reponse_correcte : [questionObj.reponse_correcte];
        let isPerfect = true;

        const options = document.querySelectorAll('.option');
        options.forEach(opt => opt.classList.add('disabled'));

        options.forEach((opt, index) => {
            const isSelected = selectedAnswers.includes(index);
            const isCorrectOption = correctAnswers.includes(index);

            if (isSelected && isCorrectOption) {
                opt.classList.add('correct');
            } else if (isSelected && !isCorrectOption) {
                opt.classList.add('incorrect');
                isPerfect = false;
            } else if (!isSelected && isCorrectOption) {
                opt.classList.add('missed'); 
                isPerfect = false;
            }
        });

        if (isPerfect) {
            correctCount++;
        } else {
            incorrectCount++;
        }
        updateCountersUI();

        userResults.push({
            questionObj: questionObj,
            selectedAnswers: [...selectedAnswers],
            isPerfect: isPerfect,
            isMultiple: isMultiple
        });

        const explainBox = document.getElementById('explanation-box');
        if (questionObj.justification || questionObj.source) {
            let explainHtml = `<h3>💡 Explication</h3>`;
            if (questionObj.justification) {
                explainHtml += `<p>${questionObj.justification}</p>`;
            }
            if (questionObj.source) {
                explainHtml += `<span class="source-tag">📄 Source : ${questionObj.source}</span>`;
            }
            explainBox.innerHTML = explainHtml;
            explainBox.style.display = 'block';
        }

        document.getElementById('validate-btn').style.display = 'none';
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        
        if (currentQuestionIndex === currentQuestions.length - 1) {
            nextBtn.textContent = "🏆 Voir mes résultats finaux";
            document.getElementById('progress-bar').style.width = `100%`;
        }
    }

    function loadNextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        const total = currentQuestions.length;
        const percentage = Math.round((correctCount / total) * 100);
        
        const circle = document.getElementById('score-circle');
        circle.style.setProperty('--percentage', `${percentage}%`);
        document.getElementById('final-score-text').textContent = `${percentage}%`;

        document.getElementById('final-correct').textContent = correctCount;
        document.getElementById('final-incorrect').textContent = incorrectCount;

        const gradeElement = document.getElementById('final-grade');
        if (percentage === 100) {
            gradeElement.innerHTML = "🌟 Grade : Commissaire Divisionnaire 🌟<br><span style='font-size:0.6em; color:white;'>Excellence absolue !</span>";
        } else if (percentage >= 80) {
            gradeElement.innerHTML = "🥇 Grade : Officier de Police Judiciaire<br><span style='font-size:0.6em; color:white;'>Très bon travail.</span>";
        } else if (percentage >= 50) {
            gradeElement.innerHTML = "🥈 Grade : Gardien de la Paix<br><span style='font-size:0.6em; color:white;'>Les bases sont là, continuez.</span>";
        } else {
            gradeElement.innerHTML = "🥉 Grade : Élève Policier<br><span style='font-size:0.6em; color:white;'>Retour à l'école de police !</span>";
        }

        const themeBreakdown = document.getElementById('theme-breakdown');
        themeBreakdown.innerHTML = '';
        
        let themeStats = {};
        userResults.forEach(res => {
            let theme = res.questionObj.theme_label || "Thème actuel";
            if (!themeStats[theme]) {
                themeStats[theme] = { total: 0, correct: 0 };
            }
            themeStats[theme].total++;
            if (res.isPerfect) {
                themeStats[theme].correct++;
            }
        });

        let keys = Object.keys(themeStats);
        if (keys.length > 1) { 
            let html = '<h3 style="text-align:center; color:var(--primary);">📊 Détail par thème</h3>';
            keys.forEach(k => {
                let st = themeStats[k];
                let pct = Math.round((st.correct / st.total) * 100);
                let color = pct >= 80 ? 'var(--success)' : (pct >= 50 ? 'var(--secondary)' : 'var(--danger)');
                html += `<div class="theme-stat"><span>${k} (${st.total} Q)</span> <strong style="color:${color};">${pct}%</strong></div>`;
            });
            themeBreakdown.innerHTML = html;
            themeBreakdown.style.display = 'block';
        } else {
            themeBreakdown.style.display = 'none';
        }

        const reviewBtn = document.getElementById('review-btn');
        if (incorrectCount > 0) {
            reviewBtn.style.display = 'block';
        } else {
            reviewBtn.style.display = 'none';
        }

        showScreen('end-screen');
    }

    function showReviewScreen() {
        const container = document.getElementById('review-container');
        container.innerHTML = '';
        
        let missed = userResults.filter(r => !r.isPerfect);
        
        missed.forEach((res, qIndex) => {
            const q = res.questionObj;
            const correctAnswers = res.isMultiple ? q.reponse_correcte : [q.reponse_correcte];
            
            let html = `<div class="review-item">`;
            html += `<h4>${q.question}</h4>`;
            if (q.theme_label) {
                html += `<div style="font-size:0.85em; color:var(--primary-light); margin-bottom:15px; font-weight:bold;">Thème : ${q.theme_label}</div>`;
            }
            
            html += `<div class="options-container" style="pointer-events: none;">`;
            q.propositions.forEach((prop, i) => {
                let optClass = 'option';
                const isSelected = res.selectedAnswers.includes(i);
                const isCorrectOption = correctAnswers.includes(i);
                
                if (isSelected && isCorrectOption) {
                    optClass += ' correct';
                } else if (isSelected && !isCorrectOption) {
                    optClass += ' incorrect';
                } else if (!isSelected && isCorrectOption) {
                    optClass += ' missed';
                } else if (isSelected) {
                    optClass += ' selected';
                }
                
                html += `<div class="${optClass}" style="padding: 12px; margin-bottom: 8px;">${prop}</div>`;
            });
            html += `</div>`;
            
            if (q.justification) {
                html += `<div style="margin-top: 15px; padding: 15px; background: #e8f8f5; border-left: 4px solid var(--success); border-radius: 8px;">`;
                html += `<strong>💡 Explication :</strong> ${q.justification}`;
                html += `</div>`;
            }
            
            html += `</div>`;
            container.innerHTML += html;
        });
        
        showScreen('review-screen');
    }

    function backToEndScreen() {
        showScreen('end-screen');
    }

    function goToHome() {
        showScreen('home-screen');
    }

    // Initialisation directe à l'ouverture de la page
    window.onload = initHome;
</script>
